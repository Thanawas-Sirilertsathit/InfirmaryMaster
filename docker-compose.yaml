services:
    db:
        image: mysql:8.4
        restart: unless-stopped
        env_file:
            - ./backend/infirmary_backend/.env
        volumes:
            - mysql_data:/var/lib/mysql
        healthcheck:
            test:
                [
                    'CMD',
                    'mysqladmin',
                    'ping',
                    '-h',
                    'localhost',
                    '-p$${MYSQL_ROOT_PASSWORD}',
                ]
            interval: 10s
            timeout: 5s
            retries: 10

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        env_file:
            - ./backend/infirmary_backend/.env
        environment:
            MYSQL_HOST: db
        command: >-
            sh -c "python manage.py migrate &&
            gunicorn infirmary.wsgi:application --bind 0.0.0.0:8000 --workers $${GUNICORN_WORKERS:-3}"
        ports:
            - '8000:8000'

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        restart: unless-stopped
        depends_on:
            - backend
        ports:
            - '80:80'

volumes:
    mysql_data:
